name = "admin-boilerplate"
main = "src/worker/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Serve the built SPA from /dist
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "admin-boilerplate"
database_id = "4d2f8af2-4ecb-46de-bf4f-a97ca39aa917"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "d2852aa2949549d9b5cf307c4d4b14ac"

[[kv_namespaces]]
binding = "MAGIC_TOKENS"
id = "51ad59ddd4e24a129d32d56f4b5bbcea"

[vars]
# Defaults — overridden by .dev.vars locally and `wrangler secret`/dashboard in prod.
ACCESS_POLICY = "allowlist"
EMAIL_PROVIDER = "console"

[dev]
port = 8787
