# After cloning, replace each REPLACE_WITH_... value with the real ID from
# `wrangler d1 create admin-boilerplate` and `wrangler kv namespace create ...`.
# See README.md → Setup for the full walkthrough.

name = "admin-boilerplate"
main = "src/worker/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Serve the built SPA from /dist
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "admin-boilerplate"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[[kv_namespaces]]
binding = "MAGIC_TOKENS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[vars]
# Defaults — overridden by .dev.vars locally and `wrangler secret`/dashboard in prod.
ACCESS_POLICY = "allowlist"
EMAIL_PROVIDER = "console"

[dev]
port = 8787
